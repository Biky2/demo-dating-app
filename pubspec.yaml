name: dating_app
description: A production-ready dating app built with Flutter, Riverpod, and Clean Architecture.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5
  go_router: ^12.1.3
  flutter_card_swiper: ^1.2.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  animate_do: ^3.3.4
  uuid: ^4.3.3
  glassmorphism_ui: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
